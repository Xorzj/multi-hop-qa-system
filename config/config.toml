# 多跳推理知识图谱问答系统 - 配置文件

[llm]
provider = "openai"
model_path = "deepseek-ai/DeepSeek-R1-0528"
base_url = "${OPENAI_BASE_URL}"
api_key = "${OPENAI_API_KEY}"
adapter_path = "models/adapters/default"

[llm.generation]
max_new_tokens = 512
temperature = 0.7
top_p = 0.9

[graph]
uri = "bolt://localhost:7687"
user = "neo4j"
password = "${NEO4J_PASSWORD}"
database = "neo4j"

[api]
host = "0.0.0.0"
port = 8000

[logging]
level = "INFO"

[data_processing]
strip_base64_images = true

[extraction]
entity_chunk_size = 1500
triple_chunk_size = 800
max_context_entities = 15
max_new_tokens = 2048
temperature = 0.05
top_p = 0.1
max_retries = 3
relation_types = ["包含", "派生", "相关", "协同", "依赖", "属于"]
