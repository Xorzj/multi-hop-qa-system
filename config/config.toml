# 多跳推理知识图谱问答系统 - 配置文件

[llm]
provider = "openai"
model_path = "deepseek-v3-0324"
base_url = "${OPENAI_BASE_URL}"
api_key = "${OPENAI_API_KEY}"
adapter_path = "models/adapters/default"

[llm.generation]
max_new_tokens = 512
temperature = 0.7
top_p = 0.9

[graph]
uri = "bolt://localhost:7687"
user = "neo4j"
password = "${NEO4J_PASSWORD}"
database = "neo4j"

[api]
host = "0.0.0.0"
port = 8000

[logging]
level = "INFO"

[data_processing]
strip_base64_images = true

[extraction]
entity_chunk_size = 1500
triple_chunk_size = 800
max_context_entities = 15
max_new_tokens = 4096
temperature = 0.05
top_p = 0.1
max_retries = 3
# schema_path — 领域 Schema JSON 文件路径（由 SchemaInducer 生成）
# 设置后实体/三元组抽取将受 Schema 约束，显著提高抽取质量
# schema_path = "config/domain_schema.json"
# relation_types — 留空以使用推荐词汇表（不强制约束），模型可自由使用文本中的准确动词
